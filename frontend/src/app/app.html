<nav>
    @if (authService.isLoggedIn) {
        <a routerLink="/data" routerLinkActive="active-link">Database</a>
        <a routerLink="/add" routerLinkActive="active-link">Add Entry</a>
        <a routerLink="/edit" routerLinkActive="active-link">Edit Entry</a>
        <button mat-stroked-button class="logout-button" (click)="authService.logout()">Log Out</button>
    }
    @else {
        <a routerLink="/login" routerLinkActive="active-link">Log In</a>
    }
</nav>

<router-outlet></router-outlet>
