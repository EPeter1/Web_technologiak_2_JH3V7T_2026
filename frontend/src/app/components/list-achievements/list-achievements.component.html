<input 
    [ngModel]="''"
    (ngModelChange)="searchTerm$.next($event)"
    placeholder="Search ..." 
/>

<app-data-table
    [data]="(filteredItems$ | async) ?? []"
    [columns]="columns"
    [showEdit]="columns[0]?.label !== 'Username'"
    (edit)="editItem($event)"
    (delete)="deleteItem($event)">
</app-data-table>
