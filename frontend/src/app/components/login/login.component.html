<div class="login-container">
    <h2>Login</h2>

    <input
        type="text"
        placeholder="Username"
        [(ngModel)]="userName"
        (input)="onInputChange()"
    />

    <input
        type="password"
        placeholder="Password"
        [(ngModel)]="password"
        (input)="onInputChange()"
    />

    <button (click)="login()">Login</button>

    @if (errorMessage() !== '') {
        <p style="color: red">
            {{ errorMessage() }}
        </p>
    }
</div>
