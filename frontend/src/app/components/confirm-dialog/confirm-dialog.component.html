<div class="dialog-container">
    <h2 mat-dialog-title>Are you sure?</h2>

    <mat-dialog-content>
        <p>Delete "{{ itemName }}"?</p>
    </mat-dialog-content>

    <mat-dialog-actions align="center">
        <button mat-raised-button (click)="onCancel()">Cancel</button>
        <button mat-raised-button class="delete-button" (click)="onConfirm()">Delete</button>
    </mat-dialog-actions>
</div>
