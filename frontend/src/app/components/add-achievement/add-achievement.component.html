<app-data-form
    [title]="title"
    [submitButtonText]="submitButtonText"
    [formGroup]="dataForm"
    (formSubmit)="onSubmit()">

    <mat-form-field appearance="outline" floatLabel="always">
        <mat-label>Game</mat-label>
        <input matInput formControlName="game"/>
        <mat-error app-form-error [control]="dataForm.get('game')"></mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" floatLabel="always">
        <mat-label>Achievement name</mat-label>
        <input matInput formControlName="name"/>
        <mat-error app-form-error [control]="dataForm.get('name')"></mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" floatLabel="always">
        <mat-label>Condition</mat-label>
        <textarea matInput formControlName="condition"></textarea>
        <mat-error app-form-error [control]="dataForm.get('condition')"></mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" floatLabel="always">
        <mat-label>Difficulty</mat-label>
        <mat-select formControlName="difficulty">
            @for (d of difficulties; track d) {
                <mat-option [value]="d">
                    {{ d }}
                </mat-option>
            }
        </mat-select>
    </mat-form-field>
</app-data-form>
