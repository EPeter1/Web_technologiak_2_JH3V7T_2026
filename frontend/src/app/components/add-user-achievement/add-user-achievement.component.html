<app-data-form
    [title]="title"
    [submitButtonText]="submitButtonText"
    [formGroup]="dataForm"
    (formSubmit)="onSubmit()">

    <mat-form-field appearance="fill">
        <mat-label>Select User</mat-label>
        <mat-select formControlName="userId">
            @for (user of users$ | async; track user._id) {
                <mat-option [value]="user._id">
                    {{ user.userName }} ({{ user.email }})
                </mat-option>
            }
        </mat-select>
        <app-form-error [control]="dataForm.get('userId')"></app-form-error>
    </mat-form-field>

    <mat-form-field appearance="fill">
        <mat-label>Select Achievement</mat-label>
        <mat-select formControlName="achievementId">
            @for (ach of achievements$ | async; track ach._id) {
                <mat-option [value]="ach._id">
                    [{{ ach.game }}] - {{ ach.name }}
                </mat-option>
            }
        </mat-select>
        <app-form-error [control]="dataForm.get('achievementId')"></app-form-error>
    </mat-form-field>

    <mat-form-field appearance="fill">
        <mat-label>Platform</mat-label>
        <mat-select formControlName="platform">
            @for (p of platforms; track p) {
                <mat-option [value]="p">{{ p }}</mat-option>
            }
        </mat-select>
    </mat-form-field>

    <mat-form-field appearance="fill">
        <mat-label>Date</mat-label>
        <input matInput [matDatepicker]="picker" formControlName="unlockedDate">
        <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="fill">
        <mat-label>Time</mat-label>
        <input matInput type="time" step="1" formControlName="unlockedTime">
    </mat-form-field>
</app-data-form>
